<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Does Insurance Package Add Up or Make Things Worse?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        .neg-num { color: #dc2626; font-weight: bold; }
        [x-cloak] { display: none !important; }
        .table-compact td, .table-compact th { padding: 0.4rem; border-bottom: 1px solid #e2e8f0; }
        .active-cell { background-color: #fef08a; font-weight: bold; border: 2px solid #eab308 !important; }
        [contenteditable="true"]:hover { outline: 1px dashed #94a3b8; cursor: text; }
        [contenteditable="true"]:focus { outline: 2px solid #3b82f6; background: rgba(255,255,255,0.1); border-radius: 2px; }
        .bg-blue-900 [contenteditable="true"]:focus, .bg-slate-800 [contenteditable="true"]:focus { background: rgba(0,0,0,0.2); }
    </style>
</head>
<body class="bg-slate-100 p-4" x-data="agriApp()" x-cloak>

    <div class="max-w-6xl mx-auto space-y-6">
        <header class="bg-blue-900 text-white p-6 rounded-xl shadow-lg">
            <h1 class="text-3xl font-bold" contenteditable="true" x-text="ui.mainTitle" @blur="ui.mainTitle = $event.target.innerText"></h1>
            <p class="text-blue-200" contenteditable="true" x-text="ui.subTitle" @blur="ui.subTitle = $event.target.innerText"></p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div :class="evModern > evTrad ? 'bg-green-600' : 'bg-red-600'" class="p-4 rounded-lg shadow text-white text-center flex flex-col justify-center min-h-[140px]">
                <h3 class="text-sm uppercase font-semibold opacity-80" contenteditable="true" x-text="ui.dashEvTitle" @blur="ui.dashEvTitle = $event.target.innerText"></h3>
                <div class="text-3xl font-bold" x-text="evModern > evTrad ? 'YES' : 'NO'"></div>
                <p class="text-xs">
                    <span contenteditable="true" x-text="ui.dashEvLabelModern" @blur="ui.dashEvLabelModern = $event.target.innerText"></span>: <span x-text="ui.currency + evModern.toFixed(1)"></span> | 
                    <span contenteditable="true" x-text="ui.dashEvLabelTrad" @blur="ui.dashEvLabelTrad = $event.target.innerText"></span>: <span x-text="ui.currency + evTrad.toFixed(1)"></span>
                </p>
            </div>

            <div :class="survivalNet >= 0 ? 'bg-green-600' : 'bg-red-600'" class="p-4 rounded-lg shadow text-white text-center flex flex-col justify-center min-h-[140px]">
                <h3 class="text-sm uppercase font-semibold opacity-80" contenteditable="true" x-text="ui.dashSurviveTitle" @blur="ui.dashSurviveTitle = $event.target.innerText"></h3>
                <div class="text-3xl font-bold" x-text="survivalNet >= 0 ? 'YES' : 'NO'"></div>
                <p class="text-xs">
                    <span contenteditable="true" x-text="ui.dashSurviveLabel" @blur="ui.dashSurviveLabel = $event.target.innerText"></span>: <span x-text="ui.currency + survivalNet.toFixed(1)"></span>
                </p>
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-6">
            <aside class="w-full md:w-1/3 bg-white p-6 rounded-xl shadow-md h-fit space-y-6 border-t-4 border-blue-900">
                <div class="space-y-4">
                    <label class="block font-bold text-xs mb-2 text-slate-700" contenteditable="true" x-text="ui.baseLabel" @blur="ui.baseLabel = $event.target.innerText"></label>
                    <div class="relative">
                        <span class="absolute left-3 top-2 text-slate-400 font-bold" x-text="ui.currency"></span>
                        <input type="number" x-model.number="base" class="w-full pl-7 p-2 border rounded-md bg-slate-50 font-bold text-blue-900">
                    </div>
                </div>

                <div class="space-y-5">
                    <h4 class="font-bold border-b pb-1 text-blue-900 text-xs uppercase tracking-wider" contenteditable="true" x-text="ui.paramHeading" @blur="ui.paramHeading = $event.target.innerText"></h4>
                    <template x-for="pItem in params" :key="pItem.key">
                        <div class="space-y-1">
                            <div class="flex justify-between items-start">
                                <span class="text-[10px] leading-tight text-slate-600 pr-4" contenteditable="true" x-text="(ui[pItem.key] || pItem.label) + ':'" @blur="ui[pItem.key] = $event.target.innerText.replace(':','')"></span>
                                <span class="bg-blue-100 text-blue-800 px-2 py-0.5 rounded text-[10px] font-bold" 
                                      x-text="pItem.key === 'loading' ? `${(pItem.val * 100).toFixed(0)}%` : `${ui.currency}${(pItem.val * base).toFixed(1)}` "></span>
                            </div>
                            <input type="range" :min="pItem.min" :max="pItem.max" :step="pItem.step" x-model.number="pItem.val" class="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                        </div>
                    </template>
                </div>

                <div class="space-y-4 pt-4 border-t">
                    <h4 class="font-bold text-blue-900 text-xs uppercase tracking-wider" contenteditable="true" x-text="ui.probHeading" @blur="ui.probHeading = $event.target.innerText"></h4>
                    <div class="space-y-3">
                        <div>
                            <label class="text-[11px] block font-medium text-slate-700">
                                <span contenteditable="true" x-text="ui.probBadLabel" @blur="ui.probBadLabel = $event.target.innerText"></span>: <span x-text="probBad.toFixed(2)"></span>
                            </label>
                            <input type="range" min="0" max="1" step="0.01" x-model.number="probBad" class="w-full">
                        </div>
                        <div>
                            <label class="text-[11px] block font-medium text-slate-700">
                                <span contenteditable="true" x-text="ui.probBasisLabel" @blur="ui.probBasisLabel = $event.target.innerText"></span>: <span x-text="probBasis.toFixed(2)"></span>
                            </label>
                            <input type="range" min="0" max="1" step="0.01" x-model.number="probBasis" class="w-full">
                        </div>
                    </div>
                </div>
                
                <div class="space-y-2 pt-4 border-t">
                    <button @click="openGameModal()" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 rounded-lg shadow transition uppercase tracking-widest" contenteditable="true" x-text="ui.gameBtnText" @blur="ui.gameBtnText = $event.target.innerText"></button>
                    <button @click="saveHtml()" class="w-full bg-green-600 hover:bg-green-700 text-white text-xs font-bold py-2 rounded-lg shadow uppercase">Save Current Version</button>
                </div>
            </aside>

            <main class="w-full md:w-2/3 space-y-6">
                <div :class="premium > p.cover ? 'bg-red-50 border-red-200' : 'bg-green-50 border-green-200'" class="rounded-xl border-2 p-5 text-center shadow-sm">
                    <div class="text-xs font-bold uppercase tracking-widest mb-1" contenteditable="true" x-text="ui.bannerTitle" @blur="ui.bannerTitle = $event.target.innerText"></div>
                    <div class="text-4xl font-black" x-text="`${ui.currency}${premium.toFixed(1)}`"></div>
                </div>

                <section class="bg-white p-6 rounded-xl shadow-md">
                    <h3 class="font-bold text-lg mb-4 border-b pb-2 text-blue-900 uppercase" contenteditable="true" x-text="ui.table1Title" @blur="ui.table1Title = $event.target.innerText"></h3>
                    <table class="w-full text-sm text-left table-compact">
                        <thead class="bg-slate-50">
                            <tr>
                                <th contenteditable="true" x-text="ui.thStrategy" @blur="ui.thStrategy = $event.target.innerText"></th>
                                <th contenteditable="true" x-text="ui.thEv" @blur="ui.thEv = $event.target.innerText"></th>
                                <th contenteditable="true" x-text="ui.thGood" @blur="ui.thGood = $event.target.innerText"></th>
                                <th contenteditable="true" x-text="ui.thBad" @blur="ui.thBad = $event.target.innerText"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="s in summaryData()" :key="s.name">
                                <tr class="hover:bg-slate-50">
                                    <td class="text-xs" x-text="s.name"></td>
                                    <td class="font-bold text-blue-800" x-text="`${ui.currency}${s.ev.toFixed(1)}`"></td>
                                    <td x-text="`${ui.currency}${s.good.toFixed(1)}`"></td>
                                    <td :class="s.bad < 0 ? 'neg-num' : ''" x-text="`${ui.currency}${s.bad.toFixed(1)}`"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </section>

                <div class="grid grid-cols-1 xl:grid-cols-2 gap-4">
                    <template x-for="bm in businessModels()" :key="bm.title">
                        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                            <h4 class="bg-slate-800 text-white px-3 py-1 text-[11px] font-bold mb-3 rounded" x-text="bm.title"></h4>
                            <table class="w-full text-[10px] table-compact leading-tight">
                                <thead><tr class="text-slate-500 border-b">
                                    <th contenteditable="true" x-text="ui.thItem" @blur="ui.thItem = $event.target.innerText"></th>
                                    <th contenteditable="true" x-text="ui.thGood" @blur="ui.thGood = $event.target.innerText"></th>
                                    <th contenteditable="true" x-text="ui.thBad" @blur="ui.thBad = $event.target.innerText"></th>
                                    <th contenteditable="true" x-text="ui.thBasis" @blur="ui.thBasis = $event.target.innerText"></th>
                                </tr></thead>
                                <tbody>
                                    <template x-for="row in bm.rows" :key="row.item">
                                        <tr :class="row.item === ui.rowNet ? 'font-bold bg-slate-50 border-t-2' : ''">
                                            <td x-text="row.item"></td>
                                            <td x-text="row.good"></td>
                                            <td x-text="row.bad"></td>
                                            <td x-text="row.basis === null ? '-' : row.basis"></td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </template>
                </div>
            </main>
        </div>
    </div>

    <div x-show="gameOpen" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4" x-transition x-cloak>
        <div class="bg-white rounded-xl w-full max-w-5xl h-[90vh] overflow-hidden flex flex-col shadow-2xl relative">
            <button @click="gameOpen = false" class="absolute top-4 right-4 text-3xl font-bold z-10">&times;</button>
            <div class="p-4 bg-slate-50 border-b flex justify-between items-center">
                <h2 class="text-lg font-bold text-blue-900 uppercase tracking-tight">
                    <span x-text="ui.simRoundLabel"></span> <span x-text="gameTab"></span>
                </h2>
            </div>
            
            <div class="flex flex-1 overflow-hidden">
                <div class="w-64 bg-slate-100 p-4 border-r space-y-4 flex flex-col text-xs">
                    <div class="bg-white p-3 rounded border border-slate-200 space-y-2">
                        <h5 class="font-black text-[10px] text-blue-800 uppercase border-b pb-1" x-text="ui.simProbTitle"></h5>
                        <div class="flex justify-between"><span>Good Year:</span><span class="font-bold" x-text="(1-probBad).toFixed(2)"></span></div>
                        <div class="flex justify-between"><span>Bad Year:</span><span class="font-bold text-red-600" x-text="probBad.toFixed(2)"></span></div>
                    </div>
                    
                    <div>
                        <label class="block font-bold text-[10px] text-slate-500 uppercase mb-1" x-text="ui.simSelectPkg"></label>
                        <select x-model="game.seeds" class="w-full p-2 border rounded bg-white">
                            <option value="normal" x-text="ui.dashEvLabelTrad"></option>
                            <option value="high" x-text="ui.dashEvLabelModern"></option>
                        </select>
                    </div>

                    <template x-if="gameTab >= 2">
                        <div>
                            <label class="block font-bold text-[10px] text-slate-500 uppercase mb-1" x-text="ui.simInsToggle"></label>
                            <select x-model="game.ins" class="w-full p-2 border rounded bg-white">
                                <option value="no">No Insurance</option>
                                <option value="yes">With Insurance</option>
                            </select>
                        </div>
                    </template>

                    <div class="pt-4 border-t mt-auto">
                        <button @click="playSeason()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg shadow uppercase" x-text="ui.simBtnPlay"></button>
                        <div class="text-center mt-2 font-bold text-blue-900 text-[10px]">
                            <span x-text="ui.simCounterLabel"></span> <span x-text="simCounts[gameTab]"></span>
                        </div>
                    </div>
                </div>

                <div class="flex-1 flex flex-col bg-white overflow-hidden">
                    <div class="flex border-b text-[10px]">
                        <template x-for="i in [1,2,3]" :key="i">
                            <button @click="gameTab = i; simulationCol = 'none';" 
                                    :class="gameTab === i ? 'border-b-4 border-blue-600 text-blue-600 bg-blue-50' : 'text-slate-400'" 
                                    class="flex-1 py-4 font-bold uppercase tracking-widest" x-text="ui['simTabTitle' + i]"></button>
                        </template>
                    </div>
                    
                    <div class="p-6 overflow-y-auto">
                        <table class="w-full text-[11px] text-left table-compact bg-white rounded shadow-sm border">
                            <thead class="bg-slate-800 text-white">
                                <tr>
                                    <th x-text="ui.thItem"></th>
                                    <th class="text-center" x-text="ui.thGood"></th>
                                    <th class="text-center" x-text="ui.thBad"></th>
                                    <th class="text-center" x-text="ui.thBasis"></th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="row in getActiveGameModel().rows" :key="row.item">
                                    <tr :class="row.item === ui.rowNet ? 'font-bold border-t-2 bg-slate-50' : ''">
                                        <td x-text="row.item"></td>
                                        <td class="text-center" :class="simulationCol === 'good' ? 'active-cell' : ''" x-text="row.good"></td>
                                        <td class="text-center" :class="simulationCol === 'bad' ? 'active-cell' : ''" x-text="row.bad"></td>
                                        <td class="text-center" :class="simulationCol === 'basis' ? 'active-cell' : ''" x-text="row.basis === null ? '-' : row.basis"></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script id="main-script">
        const CONFIG = { baseValue: 100, improvedPackageCost: 0.25, yieldBenefit: 1.5, insuranceCoverage: 0.4, insuranceLoading: 0.5, savingsValue: 0.0, probBadYear: 0.2, probBasisRisk: 0.33 };

        function agriApp() {
            return {
                ui: {
                    currency: "¤", mainTitle: "Does Insurance Package Add Up?", subTitle: "Strategy comparison tool",
                    baseLabel: "Good Year Base Value", paramHeading: "Parameters", probHeading: "Probabilities",
                    probBadLabel: "Bad Year Prob", probBasisLabel: "Failed Payout Prob", gameBtnText: "Simulate Strategy",
                    seedCost: "Improved cost", yieldBen: "Yield gain", cover: "Typical Payout", 
                    loading: "Loading Fee (%)", savings: "Outside Savings",
                    dashEvTitle: "Higher EV?", dashEvLabelModern: "Improved", dashEvLabelTrad: "Original",
                    dashSurviveTitle: "Break Even?", dashSurviveLabel: "Worst Case Net",
                    bannerTitle: "Insurance Premium", table1Title: "I. Summary Table", table2Title: "II. Strategy Business Models",
                    thStrategy: "Strategy", thEv: "Exp. Value", thGood: "Good Year", thBad: "Bad Year", thItem: "Item", thBasis: "Failed Payout",
                    rowRev: "Revenue", rowPkg: "Pkg Cost", rowIns: "Ins Cost", rowPay: "Payout", rowOut: "Other Inc", rowNet: "NET",
                    simRoundLabel: "Simulation Mode", simProbTitle: "Environment", simSelectPkg: "Package:", simInsToggle: "Insurance:", simBtnPlay: "RUN SEASON", simCounterLabel: "Total Seasons:",
                    simTabTitle1: "1. Choice", simTabTitle2: "2. Coverage", simTabTitle3: "3. Failed Payout"
                },
                base: CONFIG.baseValue, probBad: CONFIG.probBadYear, probBasis: CONFIG.probBasisRisk, gameOpen: false, gameTab: 1, simulationCol: 'none',
                simCounts: { 1: 0, 2: 0, 3: 0 }, game: { seeds: 'normal', ins: 'no' },
                params: [
                    { key: 'seedCost', val: CONFIG.improvedPackageCost, min: 0, max: 0.4, step: 0.01 },
                    { key: 'yieldBen', val: CONFIG.yieldBenefit, min: 1, max: 2, step: 0.1 },
                    { key: 'cover', val: CONFIG.insuranceCoverage, min: 0, max: 1, step: 0.01 },
                    { key: 'loading', val: CONFIG.insuranceLoading, min: 0, max: 1, step: 0.01 },
                    { key: 'savings', val: CONFIG.savingsValue, min: 0, max: 1, step: 0.01 }
                ],
                getVal(key) { const p = this.params.find(x => x.key === key); return p ? p.val * this.base : 0; },
                get p() { return { seedCost: this.getVal('seedCost'), yieldBen: this.getVal('yieldBen'), cover: this.getVal('cover'), loading: this.params.find(x => x.key === 'loading').val, savings: this.getVal('savings') }; },
                get premium() { return (this.getVal('cover') * this.probBad) * (1 + this.p.loading); },
                get survivalNet() { return 0 - this.p.seedCost - this.premium + this.p.cover + this.p.savings; },
                get evTrad() { return (1 - this.probBad) * (this.base + this.getVal('savings')) + (this.probBad * this.getVal('savings')); },
                get evModern() {
                    const v = this.p; const prem = this.premium;
                    return (1 - this.probBad) * (v.yieldBen - v.seedCost - prem + v.savings) + (this.probBad * (1 - this.probBasis)) * (0 - v.seedCost - prem + v.cover + v.savings) + (this.probBad * this.probBasis) * (0 - v.seedCost - prem + v.savings);
                },
                summaryData() {
                    const v = this.p; const prem = this.premium;
                    return [
                        { name: "Original, No Ins", ev: this.evTrad, good: this.base + v.savings, bad: v.savings },
                        { name: "Original, With Ins", ev: this.evTrad - prem + (this.probBad * v.cover), good: this.base - prem + v.savings, bad: v.cover - prem + v.savings },
                        { name: "Improved, No Ins", ev: (1 - this.probBad) * (v.yieldBen - v.seedCost + v.savings) + (this.probBad * (v.savings - v.seedCost)), good: v.yieldBen - v.seedCost + v.savings, bad: v.savings - v.seedCost },
                        { name: "Improved, With Ins", ev: this.evModern, good: v.yieldBen - v.seedCost - prem + v.savings, bad: this.survivalNet }
                    ];
                },
                businessModels() {
                    const v = this.p; const prem = this.premium;
                    return [
                        { title: "Original - No Ins", rows: this.buildRows(this.base, 0, 0, v.savings) },
                        { title: "Original - With Ins", rows: this.buildRows(this.base, 0, prem, v.savings, v.cover) },
                        { title: "Improved - No Ins", rows: this.buildRows(v.yieldBen, v.seedCost, 0, v.savings) },
                        { title: "Improved - With Ins", rows: this.buildRows(v.yieldBen, v.seedCost, prem, v.savings, v.cover) }
                    ];
                },
                buildRows(prod, seed, prem, savings, payoutSize = 0) {
                    const cur = this.ui.currency;
                    return [
                        { item: this.ui.rowRev, good: `${cur}${prod.toFixed(1)}`, bad: `${cur}0.0`, basis: `${cur}0.0` },
                        { item: this.ui.rowPkg, good: `${cur}${(-seed).toFixed(1)}`, bad: `${cur}${(-seed).toFixed(1)}`, basis: `${cur}${(-seed).toFixed(1)}` },
                        { item: this.ui.rowIns, good: `${cur}${(-prem).toFixed(1)}`, bad: `${cur}${(-prem).toFixed(1)}`, basis: `${cur}${(-prem).toFixed(1)}` },
                        { item: this.ui.rowPay, good: `${cur}0.0`, bad: `${cur}${payoutSize.toFixed(1)}`, basis: `${cur}0.0` },
                        { item: this.ui.rowOut, good: `${cur}${savings.toFixed(1)}`, bad: `${cur}${savings.toFixed(1)}`, basis: `${cur}${savings.toFixed(1)}` },
                        { item: this.ui.rowNet, good: `${cur}${(prod - seed - prem + savings).toFixed(1)}`, bad: `${cur}${(0 - seed - prem + payoutSize + savings).toFixed(1)}`, basis: (prem > 0) ? `${cur}${(0 - seed - prem + savings).toFixed(1)}` : null }
                    ];
                },
                openGameModal() { this.gameOpen = true; },
                playSeason() {
                    this.simCounts[this.gameTab]++;
                    const isBad = Math.random() < this.probBad;
                    if (this.gameTab === 3 && isBad) {
                        this.simulationCol = Math.random() < this.probBasis ? 'basis' : 'bad';
                    } else {
                        this.simulationCol = isBad ? 'bad' : 'good';
                    }
                },
                getActiveGameModel() {
                    const v = this.p;
                    const prem = (this.gameTab >= 2 && this.game.ins === 'yes') ? this.premium : 0;
                    const prod = (this.game.seeds === 'normal') ? this.base : v.yieldBen;
                    const seed = (this.game.seeds === 'normal') ? 0 : v.seedCost;
                    const payout = (prem > 0) ? v.cover : 0;
                    return { rows: this.buildRows(prod, seed, prem, v.savings, payout) };
                },
                saveHtml() {
                    const currentConfig = {
                        baseValue: this.base,
                        improvedPackageCost: this.params.find(p => p.key === 'seedCost').val,
                        yieldBenefit: this.params.find(p => p.key === 'yieldBen').val,
                        insuranceCoverage: this.params.find(p => p.key === 'cover').val,
                        insuranceLoading: this.params.find(p => p.key === 'loading').val,
                        savingsValue: this.params.find(p => p.key === 'savings').val,
                        probBadYear: this.probBad,
                        probBasisRisk: this.probBasis
                    };
                    const clone = document.documentElement.cloneNode(true);
                    clone.querySelectorAll('tbody, div.grid').forEach(parent => {
                        Array.from(parent.children).forEach(child => {
                            if (child.nodeName !== 'TEMPLATE' && (child.hasAttribute('x-for') || child.closest('[x-for]'))) child.remove();
                        });
                    });
                    const scriptTag = clone.querySelector('#main-script');
                    let scriptText = scriptTag.innerText;
                    scriptText = scriptText.replace(/const CONFIG = \{.*?\};/, `const CONFIG = ${JSON.stringify(currentConfig)};`);
                    scriptText = scriptText.replace(/ui: \{[\s\S]*?\},\n                base:/, `ui: ${JSON.stringify(this.ui, null, 16).replace(/\n/g, '\n                ').trim()},\n                base:`);
                    scriptTag.innerText = scriptText;
                    const blob = new Blob(["<!DOCTYPE html>\n" + clone.outerHTML], { type: 'text/html' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = 'agri_insurance_custom.html';
                    a.click();
                }
            }
        }
    </script>
</body>
</html>
