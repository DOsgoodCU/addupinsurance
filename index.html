<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Does Insurance Package Add Up or Make Things Worse?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        .neg-num { color: #dc2626; font-weight: bold; }
        [x-cloak] { display: none !important; }
        .table-compact td, .table-compact th { padding: 0.4rem; border-bottom: 1px solid #e2e8f0; }
        .active-cell { background-color: #fef08a; font-weight: bold; border: 2px solid #eab308 !important; }
    </style>
</head>
<body class="bg-slate-100 p-4" x-data="agriApp()" x-cloak>

    <div class="max-w-6xl mx-auto space-y-6">
        <header class="bg-blue-900 text-white p-6 rounded-xl shadow-lg">
            <h1 class="text-3xl font-bold" x-text="ui.mainTitle"></h1>
            <p class="text-blue-200" x-text="ui.subTitle"></p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div :class="evModern > evTrad ? 'bg-green-600' : 'bg-red-600'" class="p-4 rounded-lg shadow text-white text-center flex flex-col justify-center min-h-[140px]">
                <h3 class="text-sm uppercase font-semibold opacity-80" x-text="ui.dashEvTitle"></h3>
                <div class="text-3xl font-bold" x-text="evModern > evTrad ? 'YES' : 'NO'"></div>
                <p class="text-xs" x-text="`${ui.dashEvLabelModern}: ${evModern.toFixed(1)} ${ui.dashEvLabelTrad}: ${evTrad.toFixed(1)}`"></p>
                <template x-if="evModern <= evTrad">
                    <p class="mt-2 text-[10px] font-black bg-white/20 py-1 rounded uppercase tracking-wider" x-text="ui.dashEvBadMsg"></p>
                </template>
            </div>

            <div :class="survivalNet >= 0 ? 'bg-green-600' : 'bg-red-600'" class="p-4 rounded-lg shadow text-white text-center flex flex-col justify-center min-h-[140px]">
                <h3 class="text-sm uppercase font-semibold opacity-80" x-text="ui.dashSurviveTitle"></h3>
                <div class="text-3xl font-bold" x-text="survivalNet >= 0 ? 'YES' : 'NO'"></div>
                <p class="text-xs" x-text="`${ui.dashSurviveLabel}: ${survivalNet.toFixed(1)}`"></p>
                <p class="mt-2 text-[10px] font-medium opacity-90 italic" x-text="ui.dashSurviveMsg"></p>
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-6">
            <aside class="w-full md:w-1/3 bg-white p-6 rounded-xl shadow-md h-fit space-y-6 border-t-4 border-blue-900">
                <div>
                    <label class="block font-bold text-sm mb-2" x-text="ui.baseLabel"></label>
                    <input type="number" x-model.number="base" class="w-full p-2 border rounded-md bg-slate-50">
                </div>

                <div class="space-y-4">
                    <h4 class="font-bold border-b pb-1 text-blue-900 text-xs uppercase tracking-wider" x-text="ui.paramHeading"></h4>
                    <template x-for="p in params" :key="p.key">
                        <div>
                            <div class="flex justify-between text-[11px] font-semibold">
                                <span x-text="`${ui[p.key] || p.label}: ${p.val.toFixed(2)}`"></span>
                                <span class="text-blue-700 font-bold" x-text="'= ' + (p.val * base).toFixed(1)"></span>
                            </div>
                            <input type="range" :min="p.min" :max="p.max" :step="p.step" x-model.number="p.val" class="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer mt-1">
                        </div>
                    </template>
                </div>

                <div class="space-y-4 pt-4 border-t">
                    <h4 class="font-bold text-blue-900 text-xs uppercase tracking-wider" x-text="ui.probHeading"></h4>
                    <div class="space-y-3">
                        <div>
                            <label class="text-[11px] block font-medium" x-text="`${ui.probBadLabel}: ${probBad.toFixed(2)} (1 ${ui.probIn} ${(1/probBad).toFixed(1)})`"></label>
                            <input type="range" min="0.05" max="1" step="0.01" x-model.number="probBad" class="w-full">
                        </div>
                        <div>
                            <label class="text-[11px] block font-medium" x-text="`${ui.probBasisLabel}: ${probBasis.toFixed(2)} (1 ${ui.probIn} ${(1/probBasis).toFixed(1)})`"></label>
                            <input type="range" min="0" max="1" step="0.01" x-model.number="probBasis" class="w-full">
                        </div>
                    </div>
                </div>

                <button @click="openGameModal()" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 rounded-lg shadow-lg transition" x-text="ui.gameBtnText"></button>
            </aside>

            <main class="w-full md:w-2/3 space-y-8">
                <section class="bg-white p-6 rounded-xl shadow-md">
                    <h3 class="font-bold text-lg mb-4 border-b pb-2 text-blue-900 uppercase tracking-wide">I. Summary Table</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm text-left table-compact">
                            <thead class="bg-slate-50">
                                <tr><th>Strategy</th><th>Expected Value</th><th>Good Year</th><th>Bad Year</th></tr>
                            </thead>
                            <tbody>
                                <template x-for="s in summaryData()" :key="s.name">
                                    <tr class="hover:bg-slate-50">
                                        <td class="font-medium" x-text="s.name"></td>
                                        <td class="font-bold text-blue-800" x-text="s.ev.toFixed(1)"></td>
                                        <td x-text="s.good.toFixed(1)"></td>
                                        <td :class="s.bad < 0 ? 'neg-num' : ''" x-text="s.bad.toFixed(1)"></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </section>

                <section class="space-y-4">
                    <h3 class="font-bold text-lg border-b pb-2 text-blue-900 uppercase tracking-wide">II. Strategy Business Models</h3>
                    <div class="grid grid-cols-1 xl:grid-cols-2 gap-4">
                        <template x-for="bm in businessModels()" :key="bm.title">
                            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                                <h4 class="bg-slate-800 text-white px-3 py-1 text-[11px] font-bold mb-3 rounded shadow-sm inline-block uppercase tracking-tighter" x-text="bm.title"></h4>
                                <div class="overflow-x-auto">
                                    <table class="w-full text-[10px] text-left table-compact leading-tight">
                                        <thead><tr class="text-slate-500 border-b"><th>Item</th><th>Good</th><th>Bad</th><th>Basis</th></tr></thead>
                                        <tbody>
                                            <template x-for="row in bm.rows" :key="row.item">
                                                <tr :class="row.item === 'NET' ? 'font-bold bg-slate-50 border-t-2' : ''">
                                                    <td x-text="row.item"></td>
                                                    <td :class="row.good < 0 ? 'neg-num' : ''" x-text="row.good"></td>
                                                    <td :class="row.bad < 0 ? 'neg-num' : ''" x-text="row.bad"></td>
                                                    <td :class="row.basis < 0 ? 'neg-num' : ''" x-text="row.basis === null ? '-' : row.basis"></td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </template>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <div x-show="gameOpen" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-2 md:p-4">
        <div class="bg-white rounded-xl w-full max-w-6xl h-[95vh] overflow-hidden flex flex-col shadow-2xl relative">
            <button @click="gameOpen = false" class="absolute top-4 right-4 text-3xl font-bold z-10 hover:text-red-600">&times;</button>
            <div class="p-4 bg-slate-50 border-b flex justify-between items-center pr-12">
                <h2 class="text-lg font-bold text-blue-900 uppercase tracking-tight" x-text="`${ui.simRoundLabel} ${gameTab}`"></h2>
            </div>
            <div class="flex flex-1 overflow-hidden">
                <div class="w-56 bg-slate-100 p-4 border-r space-y-4 flex flex-col">
                    <div class="space-y-4 flex-1">
                        <div>
                            <label class="block font-bold text-[10px] text-slate-500 uppercase mb-1" x-text="ui.simSeedSelect"></label>
                            <select x-model="game.seeds" class="w-full p-2 border rounded text-xs bg-white">
                                <option value="normal" x-text="ui.seedNormal"></option>
                                <option value="high" x-text="ui.seedHigh"></option>
                            </select>
                        </div>
                        <div x-show="gameTab >= 2">
                            <label class="block font-bold text-[10px] text-slate-500 uppercase mb-1" x-text="ui.simInsSelect"></label>
                            <select x-model="game.ins" class="w-full p-2 border rounded text-xs bg-white">
                                <option value="no" x-text="ui.insNo"></option>
                                <option value="yes" x-text="ui.insYes"></option>
                            </select>
                        </div>
                        <div class="pt-4 border-t">
                            <button @click="playSeason()" class="w-full bg-blue-600 text-white text-[10px] font-bold py-3 rounded-lg shadow hover:bg-blue-700" x-text="ui.simBtnPlay"></button>
                            <div class="text-center mt-2 text-[10px] font-bold text-blue-900" x-text="`${ui.simCounterLabel} ${simCounts[gameTab]}`"></div>
                        </div>
                        <div class="pt-2" x-show="gameTab === 3">
                            <button @click="playBasis()" class="w-full bg-red-600 text-white text-[10px] font-bold py-3 rounded-lg shadow hover:bg-red-700" x-text="ui.simBtnBasis"></button>
                        </div>
                    </div>
                </div>
                <div class="flex-1 flex flex-col bg-white overflow-y-auto">
                    <div class="flex border-b sticky top-0 bg-white z-10">
                        <template x-for="i in [1,2,3]" :key="i">
                            <button @click="gameTab = i; resetRound();" :class="gameTab === i ? 'border-b-4 border-blue-600 text-blue-600 bg-blue-50/50' : 'text-slate-400'" class="flex-1 py-3 font-bold text-[10px] uppercase tracking-widest transition-all" x-text="ui['simTabTitle' + i]"></button>
                        </template>
                    </div>
                    <div class="p-6 space-y-6">
                        <div class="text-center">
                            <h3 class="text-base font-bold text-slate-800 mb-4" x-text="gameTitles[gameTab-1]"></h3>
                            <div class="flex justify-center items-center gap-2 md:gap-4 mb-6">
                                <div class="flex flex-col items-center">
                                    <img :src="game.seeds === 'normal' ? 'images/nseed1.png' : 'images/hqseed1.png'" class="h-20 w-20 object-contain border-2 border-slate-100 bg-white p-2 rounded-lg shadow-sm">
                                    <span class="text-[8px] font-black mt-1 text-slate-400 uppercase">Seed</span>
                                </div>
                                <template x-if="gameTab >= 2">
                                    <div class="flex items-center gap-2 md:gap-4">
                                        <div class="text-xl font-light text-slate-300">+</div>
                                        <div class="flex flex-col items-center">
                                            <img :src="game.ins === 'yes' ? 'images/insurance1.png' : 'images/noinsurance.png'" class="h-20 w-20 object-contain border-2 border-slate-100 bg-white p-2 rounded-lg shadow-sm">
                                            <span class="text-[8px] font-black mt-1 text-slate-400 uppercase">Insurance</span>
                                        </div>
                                    </div>
                                </template>
                                <div class="text-xl font-light text-slate-300">+</div>
                                <div class="flex flex-col items-center">
                                    <img :src="game.lastSeason === 'good' ? 'images/goodseason.png' : 'images/badseason.png'" class="h-20 w-20 object-contain border-2 border-slate-100 bg-white p-2 rounded-lg shadow-sm">
                                    <span class="text-[8px] font-black mt-1 text-slate-400 uppercase" x-text="game.lastSeason"></span>
                                </div>
                                <template x-if="gameTab === 3">
                                    <div class="flex items-center gap-2 md:gap-4">
                                        <div class="text-xl font-light text-slate-300">+</div>
                                        <div class="flex flex-col items-center">
                                            <img :src="game.lastBasis ? 'images/risque.png' : 'images/nrisque.png'" class="h-20 w-20 object-contain border-2 border-slate-100 bg-white p-2 rounded-lg shadow-sm">
                                            <span class="text-[8px] font-black mt-1 text-slate-400 uppercase">Basis</span>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                            <h4 class="text-[10px] font-bold text-blue-900 uppercase mb-2">Live Simulation Ledger</h4>
                            <div class="overflow-x-auto">
                                <table class="w-full text-[11px] text-left table-compact bg-white rounded shadow-sm">
                                    <thead class="bg-slate-800 text-white">
                                        <tr>
                                            <th>Accounting Item</th>
                                            <th class="text-center" :class="simulationCol === 'good' ? 'bg-blue-600' : ''">Good Year</th>
                                            <th class="text-center" :class="simulationCol === 'bad' ? 'bg-blue-600' : ''">Bad Year</th>
                                            <th class="text-center" :class="simulationCol === 'basis' ? 'bg-blue-600' : ''">Basis Risk</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template x-for="row in getActiveGameModel().rows" :key="row.item">
                                            <tr :class="row.item === 'NET' ? 'font-bold border-t-2 bg-slate-50' : ''">
                                                <td class="font-medium" x-text="row.item"></td>
                                                <td class="text-center" :class="simulationCol === 'good' ? 'active-cell' : ''" x-text="row.good"></td>
                                                <td class="text-center" :class="simulationCol === 'bad' ? 'active-cell' : ''" x-text="row.bad"></td>
                                                <td class="text-center" :class="simulationCol === 'basis' ? 'active-cell' : ''" x-text="row.basis === null ? '-' : row.basis"></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function agriApp() {
            return {
                ui: {
                    mainTitle: "Does Insurance Package Add Up? Or Make Things Worse?",
                    subTitle: "Example: Adoption of improved seeds de-risked by insurance",
                    
                    // Dashboard boxes
                    dashEvTitle: "Does Farmer better off in general with the Insurance Package?",
                    dashEvLabelModern: "Modern",
                    dashEvLabelTrad: "Trad",
                    dashEvBadMsg: "INSURANCE PACKAGE IS MAKING FARMER WORSE OFF",
                    
                    dashSurviveTitle: "Does the farmer break even in a bad year?",
                    dashSurviveLabel: "Bad Year Profit Level",
                    dashSurviveMsg: "Note: This is about covering costs, farmer may need additional government support for things like food", // Editable Note
                    
                    // Sidebar
                    baseLabel: "Original seeds and expenses are normalized to zero. Total net crop value per hectare for a good year with original seeds:",
                    paramHeading: "Parameters",
                    probHeading: "Probabilities",
                    probBadLabel: "Bad Year (Drought frequency)",
                    probBasisLabel: "Basis Risk (fraction of years insurance should pay but doesnt)",
                    probIn: "in",
                    gameBtnText: "Simulate!",
                    
                    // Sliders
                    seedCost: "Improved seed cost as fraction of crop value above, and in total net value",
                    yieldBen: "Improved yield benefit (multiplier to original yields)",
                    cover: "Typical Insurance Payout Size (as fraction of original crop value)",
                    loading: "Loading cost of insurance (insurance fees above average of no payout and typical payouts)",
                    savings: "Savings / Outside Income: Additional risk management money available to farmer",

                    // Grid Titles
                    bmTitle1: "Original Seeds",
                    bmTitle2: "Improved Seeds",
                    bmTitle3: "Original Seeds with Insurance",
                    bmTitle4: "Improved Seeds with Insurance",

                    // Simulator
                    simRoundLabel: "Game Simulator: Round",
                    simTabTitle1: "Seed Type",
                    simTabTitle2: "Insurance",
                    simTabTitle3: "Imperfect insurance",
                    simSeedSelect: "Select Seed Type:",
                    seedNormal: "Original",
                    seedHigh: "Improved",
                    simInsSelect: "Insurance Policy:",
                    insNo: "No Insurance",
                    insYes: "Active Insurance",
                    simBtnPlay: "SIMULATE SEASON",
                    simBtnBasis: "CHECK BASIS RISK",
                    simCounterLabel: "Total Rolls of the Dice this Round:"
                },
                gameTitles: [
                    "Seeds Only 1: Choice of Original or Improved Seeds",
                    "Insurance 2: Insurance Choice",
                    "Imperfect Insurance: When Insurance Misses some Bad Years (Basis Risk)"
                ],
                base: 100, probBad: 0.2, probBasis: 0.33,
                gameOpen: false, gameTab: 1, simulationCol: 'none',
                simCounts: { 1: 0, 2: 0, 3: 0 },
                game: { seeds: 'normal', ins: 'no', lastSeason: 'good', lastBasis: false },
                params: [
                    { key: 'seedCost', label: 'Improved seed cost', min: 0, max: 0.4, step: 0.01, val: 0.1 },
                    { key: 'yieldBen', label: 'Improved yield benefit', min: 1, max: 2, step: 0.1, val: 1.5 },
                    { key: 'cover', label: 'Coverage of insurance', min: 0.1, max: 1, step: 0.01, val: 0.33 },
                    { key: 'loading', label: 'Loading cost of insurance', min: 0, max: 1, step: 0.01, val: 0.15 },
                    { key: 'savings', label: 'Savings / Outside Income', min: 0, max: 1, step: 0.01, val: 0 }
                ],

                get p() { 
                    let out = {}; this.params.forEach(param => out[param.key] = param.val * this.base);
                    return out;
                },
                get premium() { return (this.base * (this.p.cover / this.base) * this.probBad) + (this.base * this.p.loading / this.base); },
                get evTrad() { return (1 - this.probBad) * (this.base + this.p.savings) + (this.probBad * this.p.savings); },
                get evModern() {
                    const v = this.p; const prem = this.premium;
                    const good = v.yieldBen - v.seedCost - prem + v.savings;
                    const badIns = 0 - v.seedCost - prem + v.cover + v.savings;
                    const badBasis = 0 - v.seedCost - prem + v.savings;
                    return (1 - this.probBad) * good + (this.probBad * (1 - this.probBasis)) * badIns + (this.probBad * this.probBasis) * badBasis;
                },
                get survivalNet() { return 0 - this.p.seedCost - this.premium + this.p.cover + this.p.savings; },

                summaryData() {
                    const v = this.p; const prem = this.premium;
                    return [
                        { name: "Original, No Insurance", ev: this.evTrad, good: this.base + v.savings, bad: v.savings },
                        { name: "Improved Seeds, No Insurance", ev: (1-this.probBad)*(v.yieldBen - v.seedCost + v.savings) + this.probBad*(v.savings - v.seedCost), good: v.yieldBen - v.seedCost + v.savings, bad: v.savings - v.seedCost },
                        { name: "Improved Seeds, Insurance", ev: this.evModern, good: v.yieldBen - v.seedCost - prem + v.savings, bad: this.survivalNet }
                    ];
                },

                businessModels() {
                    const v = this.p; const prem = this.premium;
                    const configs = [
                        { title: this.ui.bmTitle1, prod: this.base, seed: 0, ins: 0 },
                        { title: this.ui.bmTitle2, prod: v.yieldBen, seed: v.seedCost, ins: 0 },
                        { title: this.ui.bmTitle3, prod: this.base, seed: 0, ins: prem },
                        { title: this.ui.bmTitle4, prod: v.yieldBen, seed: v.seedCost, ins: prem }
                    ];
                    return configs.map(c => {
                        const payout = c.ins > 0 ? v.cover : 0;
                        return {
                            title: c.title,
                            rows: [
                                { item: "Revenue", good: c.prod.toFixed(1), bad: "0.0", basis: "0.0" },
                                { item: "Seed Cost", good: (-c.seed).toFixed(1), bad: (-c.seed).toFixed(1), basis: (-c.seed).toFixed(1) },
                                { item: "Ins. Cost", good: (-c.ins).toFixed(1), bad: (-c.ins).toFixed(1), basis: (-c.ins).toFixed(1) },
                                { item: "Payout", good: "0.0", bad: payout.toFixed(1), basis: "0.0" },
                                { item: "Outside Inc", good: v.savings.toFixed(1), bad: v.savings.toFixed(1), basis: v.savings.toFixed(1) },
                                { item: "NET", 
                                  good: (parseFloat(c.prod) - c.seed - c.ins + v.savings).toFixed(1), 
                                  bad: (0 - c.seed - c.ins + payout + v.savings).toFixed(1), 
                                  basis: c.ins > 0 ? (0 - c.seed - c.ins + v.savings).toFixed(1) : null 
                                }
                            ]
                        }
                    });
                },

                openGameModal() { this.gameOpen = true; this.resetRound(); },
                resetRound() { this.simulationCol = 'none'; this.game.lastBasis = false; },
                playSeason() {
                    this.simCounts[this.gameTab]++;
                    this.game.lastSeason = Math.random() < this.probBad ? 'bad' : 'good';
                    this.game.lastBasis = false;
                    this.simulationCol = (this.game.lastSeason === 'good') ? 'good' : 'bad';
                },
                playBasis() {
                    if (this.gameTab < 3) return;
                    this.game.lastBasis = Math.random() < this.probBasis;
                    if (this.game.lastSeason === 'bad') {
                        this.simulationCol = this.game.lastBasis ? 'basis' : 'bad';
                    }
                },
                getActiveGameModel() {
                    const v = this.p;
                    const prem = (this.gameTab >= 2 && this.game.ins === 'yes') ? this.premium : 0;
                    const prod = (this.game.seeds === 'normal') ? this.base : v.yieldBen;
                    const seed = (this.game.seeds === 'normal') ? 0 : v.seedCost;
                    const payout = (prem > 0) ? v.cover : 0;

                    return {
                        rows: [
                            { item: "Revenue", good: prod.toFixed(1), bad: "0.0", basis: "0.0" },
                            { item: "Seed Cost", good: (-seed).toFixed(1), bad: (-seed).toFixed(1), basis: (-seed).toFixed(1) },
                            { item: "Ins. Cost", good: (-prem).toFixed(1), bad: (-prem).toFixed(1), basis: (-prem).toFixed(1) },
                            { item: "Payout", good: "0.0", bad: payout.toFixed(1), basis: "0.0" },
                            { item: "Outside Inc", good: v.savings.toFixed(1), bad: v.savings.toFixed(1), basis: v.savings.toFixed(1) },
                            { item: "NET", 
                                good: (prod - seed - prem + v.savings).toFixed(1), 
                                bad: (0 - seed - prem + payout + v.savings).toFixed(1), 
                                basis: (prem > 0) ? (0 - seed - prem + v.savings).toFixed(1) : null
                            }
                        ]
                    };
                }
            }
        }
    </script>
</body>
</html>
